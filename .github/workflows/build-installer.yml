name: Build Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        variant: [base, full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Prepare embedded Python runtime (${{ matrix.variant }})
        working-directory: ${{ github.workspace }}
        run: |
          if ("${{ matrix.variant }}" -eq "full") {
            python installer/prepare_runtime.py --full
          } else {
            python installer/prepare_runtime.py
          }

      - name: Verify embedded Python
        working-directory: ${{ github.workspace }}
        run: |
          $env:PYTHONPATH = "${{ github.workspace }}"
          runtime/python/python.exe -c "import fastmcp, aiohttp; print('Core OK')"
          if ("${{ matrix.variant }}" -eq "full") {
            runtime/python/python.exe -c "import ddgs, pypdf, tiktoken; print('Plugin deps OK')"
          }

      - name: Compile installer (${{ matrix.variant }})
        working-directory: ${{ github.workspace }}
        run: ISCC.exe installer/build-${{ matrix.variant }}.iss

      - name: Debug list output
        run: Get-ChildItem -Path installer/output -Recurse

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatboxBooster-Setup-${{ matrix.variant }}
          path: installer/output/ChatboxBooster-Setup-*-${{ matrix.variant }}.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: ChatboxBooster-Setup-*
          merge-multiple: true
          path: artifacts

      - name: Publish GitHub Release
        run: |
          $files = Get-ChildItem -Path artifacts -Filter *.exe | ForEach-Object { $_.FullName }
          Write-Host "Files to upload: $files"
          
          # Attempt to create release and capture the actual exit code
          gh release create "${{ github.ref_name }}" --generate-notes $files -R "${{ github.repository }}"
          $createExitCode = $LASTEXITCODE
          
          if ($createExitCode -eq 0) {
            Write-Host "Release created successfully"
          } elseif ($createExitCode -eq 1) {
            Write-Host "Release already exists, uploading assets..."
            gh release upload "${{ github.ref_name }}" $files --clobber -R "${{ github.repository }}"
          } else {
            exit $createExitCode
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}